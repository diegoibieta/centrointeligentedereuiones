version: "3.9"
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: reuniones
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d reuniones"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:${DB_PASSWORD:-secret}@db:5432/reuniones
      SYNC_DATABASE_URL: postgresql://admin:${DB_PASSWORD:-secret}@db:5432/reuniones
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      UPLOAD_DIR: /data/uploads
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      GOOGLE_CREDENTIALS_FILE: /app/credentials.json
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
    volumes:
      - uploads:/data/uploads
      - whisper_models:/root/.cache/huggingface
      - ./backend/credentials.json:/app/credentials.json:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:${DB_PASSWORD:-secret}@db:5432/reuniones
      SYNC_DATABASE_URL: postgresql://admin:${DB_PASSWORD:-secret}@db:5432/reuniones
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      UPLOAD_DIR: /data/uploads
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      GOOGLE_CREDENTIALS_FILE: /app/credentials.json
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
    volumes:
      - uploads:/data/uploads
      - whisper_models:/root/.cache/huggingface
      - ./backend/credentials.json:/app/credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
volumes:
  pgdata:
  uploads:
  whisper_models: